# Railway/Nixpacks build config.
#
# This repo originated on Replit. If Replit env vars were copied into the
# Railway service, two of them break the build:
#   - NPM_CONFIG_REGISTRY/npm_config_registry -> point pnpm at
#     package-firewall.replit.local (unreachable on Railway -> ENOTFOUND)
#   - LD_AUDIT/REPLIT_LD_AUDIT -> "cannot be loaded as audit interface" noise
#
# These env vars take precedence over a project .npmrc, so we override them
# INLINE for the install/build commands (an inline VAR=val assignment beats an
# inherited exported var). The durable fix is still to remove those vars from
# the Railway service — see the PR description.

[phases.install]
cmds = [
  "LD_AUDIT= REPLIT_LD_AUDIT= NPM_CONFIG_REGISTRY=https://registry.npmjs.org/ npm_config_registry=https://registry.npmjs.org/ pnpm install --frozen-lockfile"
]

[phases.build]
cmds = [
  "LD_AUDIT= REPLIT_LD_AUDIT= NPM_CONFIG_REGISTRY=https://registry.npmjs.org/ pnpm run build"
]

[start]
cmd = "pnpm run start"
